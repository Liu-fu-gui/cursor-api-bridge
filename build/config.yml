version: "3"

# 构建元信息（修改后可执行：wails3 task common:update:build-assets）
info:
  companyName: "Liufugui"
  productName: "Cursor API 转换器"
  productIdentifier: "local.liufugui.cursor-agent-bridge"
  description: "自用 Cursor Agent 与 OpenAI-compatible API 转换器"
  copyright: "© 2026 Liufugui"
  comments: "本地运行，不依赖 Cursor 账号额度"
  version: "2.0.3"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

fileAssociations:

other:
  - name: 其他数据
